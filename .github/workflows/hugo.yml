name: Deploy Hugo site to Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.146.0'
          extended: true

      - name: Build
        run: hugo --minify

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Encrypt HTB writeups
        env:
          STATICRYPT_PASS: ${{ secrets.STATICRYPT_PASS }}
        run: |
          npx staticrypt@3 public/posts/htb-*/index.html \
            -p "$STATICRYPT_PASS" \
            --short \
            --template-title "Protected Post" \
            --template-instructions "This is an active HTB machine. Enter the password to view."

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
